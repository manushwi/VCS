<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shine Cleaning Services</title>
<style>
  :root{
    --green-dark:#1f3a2e;
    --green-mid:#234334;
    --cream-bg:#fbfaf7;
    --panel-bg:#f3f2ec;
    --text-muted:#5b6660;
    --radius:14px;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Helvetica Neue', Arial, sans-serif;
    background:var(--cream-bg);
    color:var(--green-dark);
  }

  .hero{
    max-width:1320px;
    margin:0 auto;
    padding:48px 32px 64px;
  }

  .grid{
    display:grid;
    grid-template-columns: 1.05fr 1fr 1fr 1fr 1.05fr;
    grid-template-rows: 210px 170px 150px;
    gap:18px;
    grid-template-areas:
      "img1 text text text img6"
      "img1 img3 .    img5 img6"
      "img2 img3 img4 img5 img7";
  }

  .grid img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:var(--radius);
    display:block;
  }

  .cell{ min-width:0; min-height:0; }

  .img1{ grid-area:img1; }
  .img2{ grid-area:img2; }
  .img3{ grid-area:img3; }
  .img4{ grid-area:img4; }
  .img5{ grid-area:img5; }
  .img6{ grid-area:img6; }
  .img7{ grid-area:img7; }

  .text{
    grid-area:text;
    background:var(--panel-bg);
    border-radius:var(--radius);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:24px 28px;
  }

  .text h1{
    margin:0 0 16px;
    font-size:clamp(26px, 3vw, 38px);
    line-height:1.18;
    font-weight:800;
    letter-spacing:-0.5px;
  }

  .text h1 em{
    font-style:italic;
    font-weight:400;
    color:#8b9089;
    font-family:Georgia, 'Times New Roman', serif;
    padding:0 4px;
  }

  .text p{
    margin:0 0 22px;
    max-width:420px;
    font-size:14.5px;
    line-height:1.6;
    color:var(--text-muted);
  }

  .btn-row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    justify-content:center;
  }

  .btn{
    padding:12px 26px;
    border-radius:999px;
    font-size:14px;
    font-weight:600;
    text-decoration:none;
    cursor:pointer;
    border:1.5px solid var(--green-dark);
    transition:opacity .15s ease, transform .15s ease;
  }

  .btn:hover{ opacity:.85; transform:translateY(-1px); }

  .btn-fill{
    background:var(--green-dark);
    color:#fff;
  }

  .btn-outline{
    background:transparent;
    color:var(--green-dark);
  }

  @media (max-width: 900px){
    .grid{
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto;
      grid-template-areas:
        "text text"
        "img1 img6"
        "img3 img5"
        "img2 img4"
        "img7 img7";
    }
    .img1, .img6{ height:260px; }
    .img2, .img3, .img4, .img5, .img7{ height:180px; }
  }

  @media (max-width: 520px){
    .grid{
      grid-template-columns: 1fr;
      grid-template-areas:
        "text"
        "img1"
        "img6"
        "img3"
        "img5"
        "img2"
        "img4"
        "img7";
    }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="grid">

    <div class="cell img1">
      <img src="https://picsum.photos/seed/shinefloor1/420/760" alt="Wooden floor deep cleaning service">
    </div>

    <div class="cell img2">
      <img src="https://picsum.photos/seed/shinefacade2/420/300" alt="Glass facade cleaning">
    </div>

    <div class="cell img3">
      <img src="https://picsum.photos/seed/shinecarpet3/420/640" alt="Carpet deep cleaning service">
    </div>

    <div class="cell img4">
      <img src="https://picsum.photos/seed/shinesofa4/420/300" alt="Sofa deep cleaning service">
    </div>

    <div class="cell img5">
      <img src="https://picsum.photos/seed/shinerope5/420/640" alt="Building facade rope access cleaning">
    </div>

    <div class="text">
      <h1>Bringing Back the <em>Shine</em> to Your&nbsp;Spaces</h1>
      <p>Professional Marble Polishing, Facade Cleaning, Carpet Cleaning, Wooden Floor Polishing &amp; Sofa Deep Cleaning Services.</p>
      <div class="btn-row">
        <a href="#quote" class="btn btn-fill">Get Free Quote</a>
        <a href="#services" class="btn btn-outline">View Services</a>
      </div>
    </div>

    <div class="cell img6">
      <img src="https://picsum.photos/seed/shinepolish6/420/760" alt="Marble floor polishing machine">
    </div>

    <div class="cell img7">
      <img src="https://picsum.photos/seed/shinesofa7/420/300" alt="Sofa upholstery cleaning service">
    </div>

  </div>
</div>

</body>
</html>
